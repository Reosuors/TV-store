name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Real .env File
      run: echo "GEMINI_API_KEY=اAIzaSyDlb2kS86L0vEqoYsbfAPpgLYIY6LqsAo0" > .env

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: gradle assembleDebug -Pandroid.packageBuildConfig=true || gradle assembleRelease

    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-files
        path: |
          app/build/outputs/apk/**/*.apk
